<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact | Hiro Sasaki</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="page contact">
    <header class="site-header">
      <a class="menu-link" href="./index.html"><span></span>Menu</a>
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="./about.html">About</a><a href="./work.html">Work</a><a href="./philosophy.html">Philosophy</a><a href="./note.html">Note</a><a class="active" href="./contact.html">Contact</a>
      </nav>
      <a class="lang-link" href="./en/contact.html"><i></i>JP / EN</a>
    </header>
    <main>
      <section class="contact-layout">
        <aside>
          <p class="kicker">Contact</p>
          <h1>Contact</h1>
          <p class="contact-subtitle">ご依頼・ご相談</p>
          <p>お仕事のご依頼、プロジェクトのご相談、メディア・インタビューなど、お気軽にご連絡ください。</p>
          <dl><dt>Email</dt><dd>info@hirosasaki.jp</dd><dt>Location</dt><dd>Tokyo, Japan</dd><dt>SNS</dt><dd>X / Instagram / YouTube</dd></dl>
        </aside>
        <form class="contact-form" id="contact-form">
          <label>お名前 / Name<input name="name" autocomplete="name" placeholder="例：佐々木 大" required /></label>
          <label>メールアドレス / Email<input type="email" name="email" autocomplete="email" placeholder="example@email.com" required /></label>
          <label>ご依頼内容 / Message<textarea name="message" placeholder="ご依頼・ご相談の内容をご記入ください。" required></textarea></label>
          <fieldset><legend>プロジェクトの種類 / Project type</legend><label><input type="radio" name="type" />映像・ビジュアル</label><label><input type="radio" name="type" />ブランド・デザイン</label><label><input type="radio" name="type" />AI・プロダクト開発</label><label><input type="radio" name="type" />その他</label></fieldset>
          <div class="form-row"><label>ご予算（任意）<input name="budget" placeholder="例：50万円〜" /></label><label>開始時期（任意）<input name="start" placeholder="例：2025年8月頃" /></label></div>
          <button type="submit">送信する <span>Send message</span></button>
          <p class="form-status" role="status" aria-live="polite"></p>
        </form>
      </section>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
